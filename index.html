<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width", initial-scale="1.0" />
    <title>Cheklist Bible</title>
    <style>body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #2c5e1a;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      padding: 15px;
      background: #f0f7ed;
      border-radius: 10px;
    }

    .progress {
      font-size: 18px;
      font-weight: bold;
      color: #2c5e1a;
    }

    button {
      background-color: #2c5e1a;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }

    .section-title {
      margin-top: 30px;
      margin-bottom: 15px;
      color: #2c5e1a;
      border-bottom: 2px solid #e5e5e5;
      padding-bottom: 6px;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px 20px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafafa;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #eee;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    .checked {
      text-decoration: line-through;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📖 Ma checklist de lecture de la Bible</h1>
    <p class="subtitle">Coche les livres que tu as déjà lus</p>

    <div class="top-bar">
      <div class="progress" id="progress">0 / 66 livres lus</div>
      <button id="resetBtn">Tout décocher</button>
    </div>

    <h2 class="section-title">Ancien Testament</h2>
    <div class="books" id="oldTestament"></div>

    <h2 class="section-title">Nouveau Testament</h2>
    <div class="books" id="newTestament"></div>
  </div>

  <script>
    const oldTestamentBooks = [
      "Genèse", "Exode", "Lévitique", "Nombres", "Deutéronome",
      "Josué", "Juges", "Ruth", "1 Samuel", "2 Samuel",
      "1 Rois", "2 Rois", "1 Chroniques", "2 Chroniques", "Esdras",
      "Néhémie", "Esther", "Job", "Psaumes", "Proverbes",
      "Ecclésiaste", "Cantique des cantiques", "Ésaïe", "Jérémie", "Lamentations",
      "Ézéchiel", "Daniel", "Osée", "Joël", "Amos",
      "Abdias", "Jonas", "Michée", "Nahum", "Habacuc",
      "Sophonie", "Aggée", "Zacharie", "Malachie"
    ];

    const newTestamentBooks = [
      "Matthieu", "Marc", "Luc", "Jean", "Actes",
      "Romains", "1 Corinthiens", "2 Corinthiens", "Galates", "Éphésiens",
      "Philippiens", "Colossiens", "1 Thessaloniciens", "2 Thessaloniciens", "1 Timothée",
      "2 Timothée", "Tite", "Philémon", "Hébreux", "Jacques",
      "1 Pierre", "2 Pierre", "1 Jean", "2 Jean", "3 Jean",
      "Jude", "Apocalypse"
    ];

    const STORAGE_KEY = "bibleChecklist";

    function getSavedBooks() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function saveBooks(checkedBooks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedBooks));
    }

    function updateProgress() {
      const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
      const total = oldTestamentBooks.length + newTestamentBooks.length;
      document.getElementById("progress").textContent = `${checked} / ${total} livres lus`;
    }

    function createBookList(containerId, books) {
      const container = document.getElementById(containerId);
      const savedBooks = getSavedBooks();

      books.forEach((book) => {
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        const span = document.createElement("span");

        checkbox.type = "checkbox";
        checkbox.value = book;
        checkbox.checked = savedBooks.includes(book);

        if (checkbox.checked) {
          span.classList.add("checked");
        }

        span.textContent = book;

        checkbox.addEventListener("change", () => {
          let checkedBooks = getSavedBooks();

          if (checkbox.checked) {
            checkedBooks.push(book);
            span.classList.add("checked");
          } else {
            checkedBooks = checkedBooks.filter((b) => b !== book);
            span.classList.remove("checked");
          }

          saveBooks(checkedBooks);
          updateProgress();
        });

        label.appendChild(checkbox);
        label.appendChild(span);
        container.appendChild(label);
      });
    }

    document.getElementById("resetBtn").addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });

    createBookList("oldTestament", oldTestamentBooks);
    createBookList("newTestament", newTestamentBooks);
    updateProgress();
  </script>
</body>
</html></style>
</head>




</html>
